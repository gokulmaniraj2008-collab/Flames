<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLAMES Game</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #0d0d0d;
    color: #f0ece4;
    font-family: 'Inter', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.4rem, 6vw, 3.8rem);
    letter-spacing: 0.18em;
    background: linear-gradient(135deg, #ff6b35, #ff9f1c, #ffcf5c, #ff6b35);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 3s linear infinite;
    text-align: center;
    margin-bottom: 6px;
  }

  @keyframes shimmer {
    to { background-position: 200% center; }
  }

  .tagline {
    color: #6b6560;
    font-size: 0.78rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 36px;
  }

  .card {
    background: #161412;
    border: 1px solid #2a2420;
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 440px;
  }

  label {
    display: block;
    font-size: 0.72rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #7a7370;
    margin-bottom: 8px;
  }

  input[type="text"] {
    width: 100%;
    background: #0d0d0d;
    border: 1px solid #2e2825;
    border-radius: 8px;
    color: #f0ece4;
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 16px;
  }

  input[type="text"]:focus {
    border-color: #ff6b35;
  }

  input[type="text"]::placeholder { color: #3e3a36; }

  button {
    width: 100%;
    background: #ff6b35;
    color: #0d0d0d;
    border: none;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 14px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 4px;
  }

  button:hover { background: #ff8555; }
  button:active { transform: scale(0.98); }

  .result-area {
    margin-top: 28px;
    display: none;
    text-align: center;
  }

  .common-letters {
    font-size: 0.78rem;
    color: #5a5550;
    margin-bottom: 16px;
    letter-spacing: 0.06em;
  }

  .flames-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .flame-letter {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-weight: 700;
    border: 2px solid #2a2420;
    color: #4a4540;
    transition: all 0.3s;
  }

  .flame-letter.active {
    border-color: #ff6b35;
    color: #ff6b35;
  }

  .flame-letter.eliminated {
    border-color: #1e1a18;
    color: #2a2520;
    text-decoration: line-through;
    text-decoration-color: #3a3530;
  }

  .flame-letter.winner {
    border-color: #ffcf5c;
    color: #ffcf5c;
    background: #1f1a0a;
    box-shadow: 0 0 18px #ffcf5c44;
    animation: pulse 1.2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 18px #ffcf5c44; }
    50% { box-shadow: 0 0 32px #ffcf5c88; }
  }

  .result-label {
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #6b6560;
    margin-bottom: 8px;
  }

  .result-text {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    margin-bottom: 6px;
  }

  .result-emoji {
    font-size: 2rem;
    margin-bottom: 16px;
  }

  .result-desc {
    font-size: 0.85rem;
    color: #7a7370;
    line-height: 1.6;
    margin-bottom: 20px;
    padding: 0 8px;
  }

  .reset-btn {
    background: transparent;
    border: 1px solid #2e2825;
    color: #7a7370;
    font-size: 0.78rem;
    padding: 10px;
    margin-top: 0;
  }

  .reset-btn:hover {
    background: #1c1816;
    color: #f0ece4;
  }

  .error {
    color: #ff6b35;
    font-size: 0.8rem;
    margin-top: -10px;
    margin-bottom: 12px;
    display: none;
  }

  .step-info {
    font-size: 0.75rem;
    color: #4a4540;
    margin-bottom: 16px;
    min-height: 18px;
  }
</style>
</head>
<body>

<h1>FLAMES</h1>
<p class="tagline">Friends · Love · Affection · Marriage · Enemies · Siblings</p>

<div class="card">
  <label for="name1">Your Name</label>
  <input type="text" id="name1" placeholder="Enter your name" autocomplete="off">

  <label for="name2">Their Name</label>
  <input type="text" id="name2" placeholder="Enter their name" autocomplete="off">

  <div class="error" id="error-msg">Please enter both names.</div>

  <button onclick="calculate()">Find Out ✦</button>

  <div class="result-area" id="result-area">
    <div class="common-letters" id="common-info"></div>
    <div class="flames-row" id="flames-row">
      <div class="flame-letter" id="fl-F">F</div>
      <div class="flame-letter" id="fl-L">L</div>
      <div class="flame-letter" id="fl-A">A</div>
      <div class="flame-letter" id="fl-M">M</div>
      <div class="flame-letter" id="fl-E">E</div>
      <div class="flame-letter" id="fl-S">S</div>
    </div>
    <div class="step-info" id="step-info"></div>
    <div class="result-label">Your result</div>
    <div class="result-text" id="result-text"></div>
    <div class="result-emoji" id="result-emoji"></div>
    <div class="result-desc" id="result-desc"></div>
    <button class="reset-btn" onclick="reset()">Try Again</button>
  </div>
</div>

<script>
  const FLAMES = ['F','L','A','M','E','S'];
  const MEANINGS = {
    F: { word: 'Friends',   emoji: '🤝', desc: 'You two share a beautiful friendship — the kind that stands the test of time.' },
    L: { word: 'Love',      emoji: '❤️', desc: 'There is a deep romantic connection between you. Love is in the air!' },
    A: { word: 'Affection', emoji: '🌸', desc: 'You share warm, caring feelings for each other. Sweet and tender.' },
    M: { word: 'Marriage',  emoji: '💍', desc: 'Soulmates! You two are destined to be together forever.' },
    E: { word: 'Enemies',   emoji: '⚡', desc: 'Sparks fly — but not the good kind. Watch out for each other!' },
    S: { word: 'Siblings',  emoji: '🫂', desc: 'Your bond is like family — protective, comfortable, and unbreakable.' },
  };

  function cleanName(name) {
    return name.toLowerCase().replace(/\s+/g, '');
  }

  function countCommon(a, b) {
    let arrA = a.split('');
    let arrB = b.split('');
    let removed = 0;
    for (let i = 0; i < arrA.length; i++) {
      let idx = arrB.indexOf(arrA[i]);
      if (idx !== -1) {
        arrA[i] = null;
        arrB[idx] = null;
        removed++;
      }
    }
    let remaining = arrA.filter(c => c !== null).length + arrB.filter(c => c !== null).length;
    return { remaining, removed };
  }

  function flamesResult(count) {
    let letters = [...FLAMES];
    let idx = 0;
    while (letters.length > 1) {
      idx = (idx + count - 1) % letters.length;
      letters.splice(idx, 1);
      if (idx === letters.length) idx = 0;
    }
    return letters[0];
  }

  function calculate() {
    const n1 = document.getElementById('name1').value.trim();
    const n2 = document.getElementById('name2').value.trim();
    const err = document.getElementById('error-msg');

    if (!n1 || !n2) {
      err.style.display = 'block';
      return;
    }
    err.style.display = 'none';

    const a = cleanName(n1), b = cleanName(n2);
    const { remaining, removed } = countCommon(a, b);
    const count = remaining;

    document.getElementById('common-info').textContent =
      `${removed} common letter${removed !== 1 ? 's' : ''} removed · ${count} letter${count !== 1 ? 's' : ''} remain`;

    // Reset flame letters
    FLAMES.forEach(l => {
      const el = document.getElementById('fl-' + l);
      el.className = 'flame-letter';
    });

    const winner = flamesResult(count);

    // Animate elimination
    let letters = [...FLAMES];
    let idx = 0;
    let step = 0;
    const eliminated = [];

    const animate = () => {
      if (letters.length === 1) {
        document.getElementById('fl-' + letters[0]).className = 'flame-letter winner';
        document.getElementById('step-info').textContent = '';
        showResult(letters[0], n1, n2);
        return;
      }
      idx = (idx + count - 1) % letters.length;
      const elim = letters[idx];
      eliminated.push(elim);
      letters.splice(idx, 1);
      if (idx === letters.length) idx = 0;

      // Update active
      FLAMES.forEach(l => {
        const el = document.getElementById('fl-' + l);
        if (eliminated.includes(l)) {
          el.className = 'flame-letter eliminated';
        } else if (letters.includes(l)) {
          el.className = 'flame-letter active';
        }
      });

      document.getElementById('step-info').textContent = `Eliminated: ${elim}`;
      step++;
      setTimeout(animate, 320);
    };

    // Start
    FLAMES.forEach(l => document.getElementById('fl-' + l).className = 'flame-letter active');
    document.getElementById('result-area').style.display = 'block';
    document.getElementById('result-text').textContent = '';
    document.getElementById('result-emoji').textContent = '';
    document.getElementById('result-desc').textContent = '';
    setTimeout(animate, 200);
  }

  function showResult(letter, n1, n2) {
    const m = MEANINGS[letter];
    const el = document.getElementById('result-text');
    el.textContent = m.word;
    el.style.color = letter === 'E' ? '#ff4444' : '#ffcf5c';
    document.getElementById('result-emoji').textContent = m.emoji;
    document.getElementById('result-desc').textContent =
      `${n1} & ${n2}: ${m.desc}`;
  }

  function reset() {
    document.getElementById('name1').value = '';
    document.getElementById('name2').value = '';
    document.getElementById('result-area').style.display = 'none';
    document.getElementById('name1').focus();
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') calculate();
  });
</script>
</body>
</html>
